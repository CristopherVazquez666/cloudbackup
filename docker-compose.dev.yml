services:
  bovedix-local:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bovedix-local
    command: npm run dev
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bovedix_node_modules:/app/node_modules
      - bovedix_dev_data:/app/data
    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  bovedix_node_modules:
  bovedix_dev_data:
